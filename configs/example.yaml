server:
  listen: "127.0.0.1:8080"
  admin_secret_env: "BROKER_ADMIN_SECRET"

audit:
  path: "/var/log/gh-agent-broker/audit.jsonl"

idempotency:
  state_path: "/var/log/gh-agent-broker/idempotency.json"

# Inert until explicitly enabled with a reviewed scanner secret and live
# response binding. Production values are owned by vps-ops.
push_tripwire:
  enabled: false
  scanner_id: "push-tripwire-scanner"
  scanner_secret_env: "PUSH_TRIPWIRE_SCANNER_SECRET"
  state_path: "/var/lib/gh-agent-broker/push-tripwire.db"
  repositories:
    example-org/example-repo:
      github_app: "coder"
      base_ref: "refs/heads/main"
      ref_patterns:
        - "^refs/heads/agent/hermes-coder-01/.+$"
  response_profiles:
    general-writer-v1:
      generation: 1
      allow_halt: true
      allow_fence: true
      bindings:
        - logical_session_id: "synthetic-logical-session"
          session_lineage_id: "11111111111111111111111111111111"
          worker_id: "synthetic-worker"
          worker_storage_lineage_id: "22222222222222222222222222222222"
          worker_fence_epoch: 1
  bounds:
    max_commits: 100
    max_paths: 300
    max_commit_message_bytes: 65536
    max_blob_bytes: 1048576
    max_total_bytes: 16777216

github:
  api_base_url: "https://api.github.com"
  git_base_url: "https://github.com"
  apps:
    coder:
      app_id: 123456
      private_key_path: "/run/secrets/github-coder-app.pem"
      installations:
        example-org/example-repo: 12345678
    reporter:
      app_id: 3684230
      private_key_path: "/run/secrets/github-reporter-app.pem"
      installations:
        grubbyhacker/*: 131601703

agents:
  - id: "hermes-coder-01"
    enabled: true
    secret_env: "HERMES_CODER_01_BROKER_SECRET"
    github_app: "coder"
    repositories:
      - "example-org/example-repo"
    operations:
      - "repo.probe"
      - "git.upload-pack"
      - "git.receive-pack"
      - "pull.create"
      - "issue.comment"
    branch_patterns:
      - "^refs/heads/agent/hermes-coder-01/.+$"
      - "^agent/hermes-coder-01/.+$"
    base_branches:
      - "main"
    branch_lifecycle_guard:
      mode: "enforce"
    permissions:
      - "contents:read"
      - "contents:write"
      - "pull_requests:write"
      - "issues:write"
    metadata_assertions:
      pull.create:
        mode: "enforce"
        fields:
          - name: "Agent-Id"
            required: true
            value: "hermes-coder-01"
            locations: ["request", "pr_body"]
          - name: "Hermes-Run-Id"
            required: true
            pattern: "^[A-Za-z0-9_.:-]+$"
            locations: ["request", "pr_body"]
          - name: "Broker-Operation-Id"
            required: true
            locations: ["pr_body"]
          - name: "GitHub-App-Installation-Id"
            required: true
            locations: ["pr_body"]
      issue.comment:
        mode: "warn"
        fields:
          - name: "Agent-Id"
            required: true
            locations: ["request", "comment_body"]
  - id: "broker-reporter-01"
    enabled: true
    secret_env: "BROKER_REPORTER_01_SECRET"
    github_app: "reporter"
    repositories:
      - "grubbyhacker/gh-agent-broker"
      - "grubbyhacker/youknowme"
      - "grubbyhacker/ykmcorpus"
    operations:
      - "repo.probe"
      - "issue.create"
    permissions:
      - "issues:write"
    metadata_assertions:
      issue.create:
        mode: "enforce"
        fields:
          - name: "Agent-Id"
            required: true
            value: "broker-reporter-01"
            locations: ["request", "issue_body"]
          - name: "Dedupe-Key"
            required: true
            pattern: "^[A-Za-z0-9_.:/-]+$"
            locations: ["request", "issue_body"]
          - name: "Broker-Operation-Id"
            required: true
            locations: ["issue_body"]
