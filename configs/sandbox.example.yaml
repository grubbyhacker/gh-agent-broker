listen: "127.0.0.1:8091"
mcp_path: "/mcp"
auth_token_env: "SANDBOX_MCP_TOKEN"
runs_dir: "/srv/hermes-sandbox-broker/runs"
launch_intent_store_path: "/srv/hermes-sandbox-broker/state/launch-intents.sqlite"
broker_url: "http://broker:8080"
production: false
max_task_bytes: 65536
max_parameter_bytes: 16384
log_byte_limit: 131072
stop_grace: "10s"

audit:
  path: "/srv/hermes-sandbox-broker/audit/sandbox-audit.jsonl"

repositories:
  - "example-org/example-repo"

launch_profiles:
  hermes-nightly:
    template: "hermes-task-worker"
    repo: "example-org/example-repo"
    base_branch: "main"
    task: "Run the configured nightly sandbox task and write the requested deliverables."
    focus: "nightly"
    max_runtime_minutes: 60
    # Set true for dispatcher profiles such as codex-issue-implement. Profiles
    # that omit it continue to allow non-idempotent manual launches.
    require_idempotency_key: false
    deliverables:
      - "/output/final-summary.md"
      - "/lessons/run-summary.md"
    allow_overrides:
      - "task"
      - "focus"
      - "max_runtime_minutes"
  # ykm-curator-upload-batch:
  #   template: "ykm-curator-dry-run"
  #   repo: "example-org/ykmcorpus"
  #   base_branch: "main"
  #   task: "Process the opaque upload selectors supplied in task.json parameters."
  #   focus: "upload-intake"
  #   max_runtime_minutes: 60
  #   deliverables:
  #     - "/output/run-report.md"
  #     - "/lessons/run-summary.md"
  #   parameters:
  #     upload_ids:
  #       type: "string_list"
  #       required: true
  #       max_items: 10
  #       max_length: 64
  #       pattern: "^[A-Za-z0-9_.:-]+$"

operator_principals:
  timer-hermes-nightly:
    token_env: "SANDBOX_OPERATOR_TIMER_TOKEN"
    allowed_profiles:
      - "hermes-nightly"
    allowed_actions:
      - "launch"
      - "dry_run"
    run_scope: "owned"
  human-operator:
    token_env: "SANDBOX_OPERATOR_ADMIN_TOKEN"
    allowed_profiles:
      - "hermes-nightly"
    allowed_actions:
      - "launch"
      - "dry_run"
      - "status"
      - "logs"
      - "artifacts"
      - "stop"
      - "cleanup"
    run_scope: "profile"

network_policies:
  worker-net:
    network: "hermes-sandbox-workers"
  none:
    none: true

credential_bundles:
  hermes-worker:
    source_path: "/srv/hermes-sandbox-credentials/hermes-worker"
    mount_path: "/credentials/hermes"
    readonly: true
    allowed_templates:
      - "hermes-auth-probe"
      - "hermes-task-worker"
    secret_files:
      - "auth.json"
    redact_files:
      - "config.yaml"

templates:
  hermes-auth-probe:
    image: "ghcr.io/example-org/hermes-sandbox-auth-probe:dev"
    command:
      - "/usr/local/bin/sandbox-hermes-auth-probe"
    user: "10000:10000"
    resources:
      cpu_shares: 512
      memory_mb: 4096
      pids_limit: 512
    network_policy: "worker-net"
    max_runtime_minutes: 10
    broker_agent_id: "hermes-coder-01"
    broker_agent_secret_env: "HERMES_CODER_01_BROKER_SECRET"
    credential_bundle: "hermes-worker"
    branch_policy:
      generate_prefix: "agent"
      allowed_patterns:
        - "^agent/hermes-coder-01/[A-Za-z0-9_.:-]+$"
      base_branches:
        - "main"
    deliverables:
      - "/output/final-summary.md"
      - "/lessons/run-summary.md"
    environment:
      GIT_AUTHOR_NAME: "Hermes Sandbox Worker"
      GIT_COMMITTER_NAME: "Hermes Sandbox Worker"

