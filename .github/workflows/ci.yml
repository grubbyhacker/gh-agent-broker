name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changed-paths:
    runs-on: ubuntu-latest
    outputs:
      broker-image: ${{ steps.filter.outputs.broker_image }}
      container-smoke: ${{ steps.filter.outputs.container_smoke }}
      sandbox-e2e: ${{ steps.filter.outputs.sandbox_e2e }}
      codex-worker-image: ${{ steps.filter.outputs.codex_worker_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            broker_image:
              - '.dockerignore'
              - 'Dockerfile'
              - 'go.mod'
              - 'go.sum'
              - 'cmd/**'
              - 'internal/**'
            container_smoke:
              - '.github/workflows/ci.yml'
              - '.dockerignore'
              - 'Dockerfile'
              - 'go.mod'
              - 'go.sum'
              - 'cmd/**'
              - 'internal/**'
              - 'scripts/container-smoke.sh'
            sandbox_e2e:
              - '.github/workflows/ci.yml'
              - '.github/workflows/sandbox-e2e-scheduled.yml'
              - '.dockerignore'
              - 'Dockerfile.sandbox-e2e'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - 'cmd/sandbox-broker/**'
              - 'cmd/sandbox-e2e/**'
              - 'internal/api/**'
              - 'internal/audit/**'
              - 'internal/auth/**'
              - 'internal/config/**'
              - 'internal/githubapp/**'
              - 'internal/idempotency/**'
              - 'internal/ids/**'
              - 'internal/limits/**'
              - 'internal/metadata/**'
              - 'internal/policy/**'
              - 'internal/sandbox/**'
              - 'internal/server/**'
              - 'scripts/sandbox-e2e.sh'
            codex_worker_image:
              - '.github/workflows/ci.yml'
              - '.dockerignore'
              - 'go.mod'
              - 'go.sum'
              - 'cmd/gh-agent-broker/**'
              - 'internal/config/**'
              - 'workers/codex-implementation/**'

  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true

      - name: Run hygiene gate
        run: make ci

  container-smoke:
    runs-on: ubuntu-latest
    needs: [changed-paths]
    if: needs.changed-paths.outputs.container-smoke == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run container smoke test
        run: make smoke-container

  sandbox-e2e:
    runs-on: ubuntu-latest
    needs: [changed-paths]
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      needs.changed-paths.outputs.sandbox-e2e == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build sandbox E2E image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.sandbox-e2e
          load: true
          tags: gh-agent-broker:sandbox-e2e
          provenance: false
          cache-from: type=gha,scope=sandbox-e2e
          cache-to: type=gha,scope=sandbox-e2e,mode=max

      - name: Run fast sandbox MCP E2E
        if: github.event_name == 'pull_request'
        env:
          SANDBOX_E2E_SKIP_IMAGE_BUILD: "1"
        run: make sandbox-e2e-fast

      - name: Run full sandbox MCP E2E
        if: github.event_name != 'pull_request'
        env:
          SANDBOX_E2E_SKIP_IMAGE_BUILD: "1"
        run: make sandbox-e2e

  codex-worker-image:
    runs-on: ubuntu-latest
    needs: [changed-paths]
    if: needs.changed-paths.outputs.codex-worker-image == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build Codex implementation worker image
        run: docker build -f workers/codex-implementation/Dockerfile -t gh-agent-broker/codex-implementation-worker:ci .

  publish-image:
    runs-on: ubuntu-latest
    needs: [changed-paths, check, container-smoke, sandbox-e2e]
    if: >-
      always() && github.event_name == 'push' &&
      needs.check.result == 'success' &&
      (needs.container-smoke.result == 'success' || needs.container-smoke.result == 'skipped') &&
      (needs.sandbox-e2e.result == 'success' || needs.sandbox-e2e.result == 'skipped')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/grubbyhacker/gh-agent-broker
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=main,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-codex-worker-image:
    runs-on: ubuntu-latest
    needs: [changed-paths, check, container-smoke, sandbox-e2e, codex-worker-image]
    if: >-
      always() && github.event_name == 'push' &&
      needs.changed-paths.outputs.codex-worker-image == 'true' &&
      needs.check.result == 'success' &&
      (needs.container-smoke.result == 'success' || needs.container-smoke.result == 'skipped') &&
      (needs.sandbox-e2e.result == 'success' || needs.sandbox-e2e.result == 'skipped') &&
      needs.codex-worker-image.result == 'success'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/grubbyhacker/gh-agent-broker-codex-worker
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=main,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and publish Codex implementation worker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: workers/codex-implementation/Dockerfile
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release-binaries:
    runs-on: ubuntu-latest
    needs: [check, container-smoke, sandbox-e2e]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true

      - name: Build Linux release binaries
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/gh-agent-broker-linux-amd64 ./cmd/broker
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/gh-agent-broker-cli-linux-amd64 ./cmd/gh-agent-broker
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/broker-issue-reporter-linux-amd64 ./cmd/broker-issue-reporter
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/sandbox-broker-linux-amd64 ./cmd/sandbox-broker
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/gh-agent-proxy-linux-amd64 ./cmd/gh-agent-proxy
          (cd dist && sha256sum gh-agent-broker-linux-amd64 gh-agent-broker-cli-linux-amd64 broker-issue-reporter-linux-amd64 sandbox-broker-linux-amd64 gh-agent-proxy-linux-amd64 > SHA256SUMS)

      - name: Publish GitHub Release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* --title "$TAG" --generate-notes
          fi
