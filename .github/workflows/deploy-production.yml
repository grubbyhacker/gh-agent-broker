name: Deploy Production

# Required repository secrets:
# - DEPLOY_SSH_PRIVATE_KEY: ed25519 private key for github-deployer@srv1656293.hstgr.cloud.
# - VPS_OPS_READ_TOKEN: fine-grained PAT with read access to grubbyhacker/vps-ops.
# - ANSIBLE_VAULT_PASSWORD: password for decrypting ansible-vault secrets in vps-ops.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  issues: write

jobs:
  deploy:
    name: Deploy gh-agent-broker
    runs-on: ubuntu-latest
    environment: production
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'

    steps:
      - name: Checkout vps-ops
        uses: actions/checkout@v6
        with:
          repository: grubbyhacker/vps-ops
          token: ${{ secrets.VPS_OPS_READ_TOKEN }}
          path: vps-ops

      - name: Install Ansible
        run: |
          python3 -m pip install --user "ansible==10.*"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Ansible collections
        working-directory: vps-ops
        run: ansible-galaxy collection install -r requirements.yml

      - name: Write deploy SSH key
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          install -m 0600 /dev/null /tmp/hermes-deploy
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > /tmp/hermes-deploy

      - name: Write vault password
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
        run: |
          mkdir -p ~/.config/vps-ops
          install -m 0600 /dev/null ~/.config/vps-ops/vault-password
          printf '%s' "$ANSIBLE_VAULT_PASSWORD" > ~/.config/vps-ops/vault-password

      - name: Deploy gh-agent-broker
        working-directory: vps-ops
        run: |
          ansible-playbook -i inventory/production.yml playbooks/deploy-gh-agent-broker.yml \
            -e "broker_image=ghcr.io/grubbyhacker/gh-agent-broker:sha-${{ github.event.workflow_run.head_sha }}" \
            -e "ansible_ssh_private_key_file=/tmp/hermes-deploy"

      - name: Capture SSH failure diagnostics
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e

          warn() {
            echo "::warning::$*"
          }

          compact_file() {
            tr '\r\n' '  ' < "$1" | sed -E 's/[[:space:]]+/ /g; s/^ //; s/ $//' | cut -c1-500
          }

          install_diag_package() {
            local tool="$1"
            local package="$2"
            local suffix="$3"

            if command -v "$tool" >/dev/null 2>&1; then
              return 0
            fi

            if ! sudo apt-get update >"/tmp/ssh-diag-apt-update-${suffix}.log" 2>&1; then
              warn "Unable to update apt metadata for ${package}: $(compact_file "/tmp/ssh-diag-apt-update-${suffix}.log")"
            fi

            if ! sudo apt-get install -y "$package" >"/tmp/ssh-diag-${package}-install.log" 2>&1; then
              warn "Unable to install ${package}: $(compact_file "/tmp/ssh-diag-${package}-install.log")"
            fi
          }

          host="srv1656293.hstgr.cloud"
          port="22"
          user="github-deployer"
          label="ssh-deploy-flakiness"
          issue_title="SSH deploy flakiness log"

          ts_utc="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          runner_ip_ipify="$(curl -s --max-time 5 https://api.ipify.org 2>&1)"
          runner_ip_ifconfig="$(curl -s --max-time 5 https://ifconfig.me 2>&1)"
          runner_ip_summary="$(printf '%s' "${runner_ip_ipify:-unknown}" | tr -d '\r\n')"

          ssh_start="$(date +%s)"
          ssh_error="$(
            ssh -vvv \
              -o BatchMode=yes \
              -o ConnectTimeout=10 \
              -o ConnectionAttempts=1 \
              -o StrictHostKeyChecking=accept-new \
              -o AddressFamily=inet \
              -i /tmp/hermes-deploy \
              -p "$port" \
              "${user}@${host}" \
              'echo ok' 2>&1
          )"
          ssh_end="$(date +%s)"
          time_to_fail_s="$((ssh_end - ssh_start))"

          if grep -qi "Connection refused" <<<"$ssh_error"; then
            error_class="refused"
          elif grep -Eqi "Connection timed out|Operation timed out" <<<"$ssh_error"; then
            error_class="timed_out"
          elif grep -qi "Connection reset" <<<"$ssh_error"; then
            error_class="reset"
          elif grep -Eqi "Permission denied|publickey" <<<"$ssh_error"; then
            error_class="auth"
          elif grep -Eqi "Could not resolve|Name or service not known" <<<"$ssh_error"; then
            error_class="dns"
          else
            error_class="other"
          fi

          install_diag_package "nc" "netcat-openbsd" "netcat"
          if command -v nc >/dev/null 2>&1; then
            tcp22="$(nc -vz -w5 "$host" "$port" 2>&1)"
          else
            tcp22="nc unavailable"
          fi

          install_diag_package "mtr" "mtr-tiny" "mtr"
          if command -v mtr >/dev/null 2>&1; then
            mtr_output="$(mtr -T -P "$port" -c 10 --report "$host" 2>&1)"
          else
            mtr_output="mtr unavailable"
          fi

          export SSH_DIAG_TS_UTC="$ts_utc"
          export SSH_DIAG_RUNNER_IP_IPIFY="$runner_ip_ipify"
          export SSH_DIAG_RUNNER_IP_IFCONFIG="$runner_ip_ifconfig"
          export SSH_DIAG_SSH_ERROR="$ssh_error"
          export SSH_DIAG_ERROR_CLASS="$error_class"
          export SSH_DIAG_TIME_TO_FAIL_S="$time_to_fail_s"
          export SSH_DIAG_TCP22="$tcp22"
          export SSH_DIAG_MTR="$mtr_output"
          export SSH_DIAG_RUN_ID="${{ github.run_id }}"
          export SSH_DIAG_RUN_ATTEMPT="${{ github.run_attempt }}"
          export SSH_DIAG_JOB="${{ github.job }}"
          export SSH_DIAG_WORKFLOW="${{ github.workflow }}"
          export SSH_DIAG_RUNNER_NAME="${{ runner.name }}"
          export SSH_DIAG_RUNNER_ENV="$RUNNER_ENVIRONMENT"

          diagnostics_json="$(
            python3 - <<'PY'
          import json
          import os

          def env(name):
              return os.environ.get(name, "")

          try:
              time_to_fail_s = int(env("SSH_DIAG_TIME_TO_FAIL_S"))
          except ValueError:
              time_to_fail_s = 0

          print(json.dumps({
              "ts_utc": env("SSH_DIAG_TS_UTC"),
              "runner_ip": {
                  "api_ipify_org": env("SSH_DIAG_RUNNER_IP_IPIFY"),
                  "ifconfig_me": env("SSH_DIAG_RUNNER_IP_IFCONFIG"),
              },
              "ssh_error": env("SSH_DIAG_SSH_ERROR"),
              "error_class": env("SSH_DIAG_ERROR_CLASS"),
              "time_to_fail_s": time_to_fail_s,
              "tcp22": env("SSH_DIAG_TCP22"),
              "mtr": env("SSH_DIAG_MTR"),
              "gh": {
                  "run_id": env("SSH_DIAG_RUN_ID"),
                  "run_attempt": env("SSH_DIAG_RUN_ATTEMPT"),
                  "job": env("SSH_DIAG_JOB"),
                  "workflow": env("SSH_DIAG_WORKFLOW"),
                  "runner_name": env("SSH_DIAG_RUNNER_NAME"),
                  "runner_env": env("SSH_DIAG_RUNNER_ENV"),
              },
          }, indent=2))
          PY
          )"
          if [[ -z "$diagnostics_json" ]]; then
            warn "Unable to render SSH diagnostics JSON"
            diagnostics_json="{}"
          fi

          echo '```json'
          printf '%s\n' "$diagnostics_json"
          echo '```'

          summary="FAIL ${error_class} runner=${runner_ip_summary:-unknown} ${ts_utc} attempt=${{ github.run_attempt }}"
          comment_body="$(mktemp)"
          {
            printf '%s\n\n' "$summary"
            echo '```json'
            printf '%s\n' "$diagnostics_json"
            echo '```'
          } > "$comment_body"

          gh_error="$(mktemp)"
          label_names="$(
            gh label list \
              --repo "$GITHUB_REPOSITORY" \
              --search "$label" \
              --json name \
              --jq '.[].name' 2>"$gh_error"
          )"
          label_list_status="$?"
          if [[ "$label_list_status" -ne 0 ]]; then
            warn "Unable to list GitHub labels, durable SSH diagnostics may not be logged: $(compact_file "$gh_error")"
            label_exists=""
          else
            label_exists="$(awk -v label="$label" '$0 == label { print; exit }' <<<"$label_names")"
          fi

          if [[ "$label_list_status" -eq 0 && -z "$label_exists" ]]; then
            if ! gh label create "$label" \
              --repo "$GITHUB_REPOSITORY" \
              --description "SSH deploy flakiness diagnostics" \
              --color "d73a4a" > /dev/null 2>"$gh_error"; then
              warn "Unable to create GitHub label '${label}', durable SSH diagnostics may not be logged: $(compact_file "$gh_error")"
            fi
          fi

          issue_number="$(
            gh issue list \
              --repo "$GITHUB_REPOSITORY" \
              --state open \
              --label "$label" \
              --json number \
              --jq '.[0].number // empty' 2>"$gh_error"
          )"
          issue_list_status="$?"
          if [[ "$issue_list_status" -ne 0 ]]; then
            warn "Unable to list SSH deploy flakiness tracking issues: $(compact_file "$gh_error")"
            issue_number=""
          fi

          if [[ -z "$issue_number" ]]; then
            issue_url="$(
              gh issue create \
                --repo "$GITHUB_REPOSITORY" \
                --title "$issue_title" \
                --body "Durable log for intermittent production deploy SSH failures." \
                --label "$label" 2>"$gh_error"
            )"
            issue_create_status="$?"
            if [[ "$issue_create_status" -eq 0 ]]; then
              issue_number="${issue_url##*/}"
            else
              warn "Unable to create SSH deploy flakiness tracking issue: $(compact_file "$gh_error")"
              issue_number=""
            fi
          fi

          if [[ -n "$issue_number" ]]; then
            if gh issue comment "$issue_number" \
              --repo "$GITHUB_REPOSITORY" \
              --body-file "$comment_body" > /dev/null 2>"$gh_error"; then
              echo "Posted SSH failure diagnostics to issue #${issue_number}"
            else
              warn "Unable to post SSH diagnostics comment to issue #${issue_number}: $(compact_file "$gh_error")"
            fi
          else
            warn "Skipping durable SSH diagnostics comment because no tracking issue was available"
          fi

      - name: Clean up secrets
        if: always()
        run: |
          rm -f /tmp/hermes-deploy
          rm -f ~/.config/vps-ops/vault-password
