name: Deploy Production

# Required repository secrets:
# - DEPLOY_SSH_PRIVATE_KEY: ed25519 private key for github-deployer@srv1656293.hstgr.cloud.
# - VPS_OPS_READ_TOKEN: fine-grained PAT with read access to grubbyhacker/vps-ops.
# - ANSIBLE_VAULT_PASSWORD: password for decrypting ansible-vault secrets in vps-ops.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_sha:
        description: Optional Git SHA to deploy; defaults to the workflow dispatch ref SHA.
        required: false

permissions:
  contents: read
  issues: write

jobs:
  deploy:
    name: Deploy gh-agent-broker
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_PORT: "443"
    if: >-
      (github.event_name == 'workflow_dispatch' && github.ref_name == 'main') ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')

    steps:
      - name: Resolve deployment inputs
        id: deploy_inputs
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            deploy_sha="${{ github.event.inputs.image_sha || github.sha }}"
            deploy_branch="${{ github.ref_name }}"
            deploy_source="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            deploy_sha="${{ github.event.workflow_run.head_sha }}"
            deploy_branch="${{ github.event.workflow_run.head_branch }}"
            deploy_source="${{ github.event.workflow_run.html_url }}"
          fi

          echo "deploy_sha=$deploy_sha" >> "$GITHUB_OUTPUT"
          echo "deploy_branch=$deploy_branch" >> "$GITHUB_OUTPUT"
          echo "deploy_source=$deploy_source" >> "$GITHUB_OUTPUT"

      - name: Checkout vps-ops
        uses: actions/checkout@v7
        with:
          repository: grubbyhacker/vps-ops
          token: ${{ secrets.VPS_OPS_READ_TOKEN }}
          path: vps-ops

      - name: Install Ansible
        run: |
          python3 -m pip install --user "ansible==10.*"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Ansible collections
        working-directory: vps-ops
        run: ansible-galaxy collection install -r requirements.yml

      - name: Write deploy SSH key
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          install -m 0600 /dev/null /tmp/hermes-deploy
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > /tmp/hermes-deploy

      - name: Write vault password
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
        run: |
          mkdir -p ~/.config/vps-ops
          install -m 0600 /dev/null ~/.config/vps-ops/vault-password
          printf '%s' "$ANSIBLE_VAULT_PASSWORD" > ~/.config/vps-ops/vault-password

      - name: Deploy gh-agent-broker
        working-directory: vps-ops
        run: |
          ansible-playbook -i inventory/production.yml playbooks/deploy-gh-agent-broker.yml \
            -e "broker_image=ghcr.io/grubbyhacker/gh-agent-broker:sha-${{ steps.deploy_inputs.outputs.deploy_sha }}" \
            -e "ansible_port=${DEPLOY_PORT}" \
            -e "ansible_ssh_private_key_file=/tmp/hermes-deploy"

      - name: Log successful deploy telemetry
        if: success()
        uses: ./vps-ops/.github/actions/deploy-telemetry
        with:
          outcome: success
          service_label: gh-agent-broker
          github_token: ${{ github.token }}

      - name: Capture SSH failure diagnostics
        if: failure()
        uses: ./vps-ops/.github/actions/deploy-telemetry
        with:
          outcome: failure
          ssh_host: srv1656293.hstgr.cloud
          ssh_user: github-deployer
          ssh_port: ${{ env.DEPLOY_PORT }}
          ssh_key_path: /tmp/hermes-deploy
          service_label: gh-agent-broker
          github_token: ${{ github.token }}

      - name: Clean up secrets
        if: always()
        run: |
          rm -f /tmp/hermes-deploy
          rm -f ~/.config/vps-ops/vault-password
