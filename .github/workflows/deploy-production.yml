name: Deploy Production

# Required repository secrets:
# - DEPLOY_SSH_PRIVATE_KEY: ed25519 private key for github-deployer@100.66.40.39.
# - TS_OAUTH_CLIENT_ID: OAuth client ID for tailscale/github-action@v4.
# - TS_OAUTH_SECRET: OAuth secret for tailscale/github-action@v4.
# - VPS_OPS_READ_TOKEN: fine-grained PAT with read access to grubbyhacker/vps-ops.
# - VPS_OPS_* Doppler env-source runtime secrets consumed by the vps-ops deploy wrapper:
# - VPS_OPS_GH_BROKER_ADMIN_SECRET
# - VPS_OPS_GH_BROKER_REPORTER_01_SECRET
# - VPS_OPS_GH_BROKER_SANDBOX_MCP_TOKEN
# - VPS_OPS_GH_BROKER_YKM_CURATOR_BROKER_SECRET
# - VPS_OPS_HERMES_BROKER_AGENT_SECRET
# - VPS_OPS_GH_BROKER_HERMES_AGENT_INFRA_APP_PEM
# - VPS_OPS_GH_BROKER_FLEIGLABS_REPO_AGENT_BROKER_SECRET
# - VPS_OPS_GH_BROKER_AGENTD_COORDINATOR_TOKEN
# - VPS_OPS_GH_BROKER_FLEIGLABS_REPO_AGENT_APP_PEM
# - VPS_OPS_GH_BROKER_AGENT_PROXY_TOKEN
# - VPS_OPS_GH_BROKER_LITELLM_MASTER_KEY
# - VPS_OPS_GH_BROKER_OPENROUTER_API_KEY
# - VPS_OPS_GH_BROKER_REPORTER_APP_PEM
# - VPS_OPS_GH_BROKER_YKM_CURATOR_APP_PEM
# - VPS_OPS_GH_BROKER_YKM_CURATOR_SANDBOX_TIMER_TOKEN
# - VPS_OPS_GH_BROKER_YKM_CURATOR_SANDBOX_ADMIN_TOKEN
# - VPS_OPS_GH_BROKER_YKM_CURATOR_SANDBOX_STAGING_ADMIN_TOKEN
# - VPS_OPS_GH_BROKER_OPENROUTER_CURATOR_API_KEY
# - VPS_OPS_GH_BROKER_GH_AGENT_CODEX_PROXY_TOKEN
# - VPS_OPS_DOPPLER_SOURCE: set to env in deploy step.
# - VPS_OPS_DOPPLER_ROLES: set to gh-agent-broker in deploy step.
# - VPS_OPS_SECRET_BACKEND: set to doppler in deploy step.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_sha:
        description: Optional Git SHA to deploy; defaults to the workflow dispatch ref SHA.
        required: false

permissions:
  contents: read
  issues: write

jobs:
  deploy:
    name: Deploy gh-agent-broker
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_HOST: "100.66.40.39"
      DEPLOY_PORT: "22"
    if: >-
      (github.event_name == 'workflow_dispatch' && github.ref_name == 'main') ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')

    steps:
      - name: Resolve deployment inputs
        id: deploy_inputs
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            deploy_sha="${{ github.event.inputs.image_sha || github.sha }}"
            deploy_branch="${{ github.ref_name }}"
            deploy_source="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            deploy_sha="${{ github.event.workflow_run.head_sha }}"
            deploy_branch="${{ github.event.workflow_run.head_branch }}"
            deploy_source="${{ github.event.workflow_run.html_url }}"
          fi

          echo "deploy_sha=$deploy_sha" >> "$GITHUB_OUTPUT"
          echo "deploy_branch=$deploy_branch" >> "$GITHUB_OUTPUT"
          echo "deploy_source=$deploy_source" >> "$GITHUB_OUTPUT"

      - name: Checkout vps-ops
        uses: actions/checkout@v7
        with:
          repository: grubbyhacker/vps-ops
          token: ${{ secrets.VPS_OPS_READ_TOKEN }}
          path: vps-ops

      - name: Verify deployment secret prerequisites
        working-directory: vps-ops
        env:
          VPS_OPS_GH_BROKER_ADMIN_SECRET: ${{ secrets.VPS_OPS_GH_BROKER_ADMIN_SECRET }}
          VPS_OPS_GH_BROKER_REPORTER_01_SECRET: ${{ secrets.VPS_OPS_GH_BROKER_REPORTER_01_SECRET }}
          VPS_OPS_GH_BROKER_REPORTER_APP_PEM: ${{ secrets.VPS_OPS_GH_BROKER_REPORTER_APP_PEM }}
          VPS_OPS_GH_BROKER_SANDBOX_MCP_TOKEN: ${{ secrets.VPS_OPS_GH_BROKER_SANDBOX_MCP_TOKEN }}
          VPS_OPS_GH_BROKER_YKM_CURATOR_BROKER_SECRET: ${{ secrets.VPS_OPS_GH_BROKER_YKM_CURATOR_BROKER_SECRET }}
          VPS_OPS_HERMES_BROKER_AGENT_SECRET: ${{ secrets.VPS_OPS_HERMES_BROKER_AGENT_SECRET }}
          VPS_OPS_GH_BROKER_HERMES_AGENT_INFRA_APP_PEM: ${{ secrets.VPS_OPS_GH_BROKER_HERMES_AGENT_INFRA_APP_PEM }}
          VPS_OPS_GH_BROKER_FLEIGLABS_REPO_AGENT_BROKER_SECRET: ${{ secrets.VPS_OPS_GH_BROKER_FLEIGLABS_REPO_AGENT_BROKER_SECRET }}
          VPS_OPS_GH_BROKER_AGENTD_COORDINATOR_TOKEN: ${{ secrets.VPS_OPS_GH_BROKER_AGENTD_COORDINATOR_TOKEN }}
          VPS_OPS_GH_BROKER_FLEIGLABS_REPO_AGENT_APP_PEM: ${{ secrets.VPS_OPS_GH_BROKER_FLEIGLABS_REPO_AGENT_APP_PEM }}
          VPS_OPS_GH_BROKER_YKM_CURATOR_APP_PEM: ${{ secrets.VPS_OPS_GH_BROKER_YKM_CURATOR_APP_PEM }}
          VPS_OPS_GH_BROKER_AGENT_PROXY_TOKEN: ${{ secrets.VPS_OPS_GH_BROKER_AGENT_PROXY_TOKEN }}
          VPS_OPS_GH_BROKER_LITELLM_MASTER_KEY: ${{ secrets.VPS_OPS_GH_BROKER_LITELLM_MASTER_KEY }}
          VPS_OPS_GH_BROKER_OPENROUTER_API_KEY: ${{ secrets.VPS_OPS_GH_BROKER_OPENROUTER_API_KEY }}
        run: python3 scripts/verify-deploy-secret-prerequisites.py --role gh-agent-broker

      - name: Connect to Tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-actions-deploy
          ping: ${{ env.DEPLOY_HOST }}

      - name: Install Ansible
        run: |
          python3 -m pip install --user "ansible==10.*"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Ansible collections
        working-directory: vps-ops
        run: ansible-galaxy collection install -r requirements.yml

      - name: Write deploy SSH key
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          install -m 0600 /dev/null /tmp/hermes-deploy
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > /tmp/hermes-deploy

      - name: Deploy gh-agent-broker
        working-directory: vps-ops
        env:
          VPS_OPS_SECRET_BACKEND: doppler
          VPS_OPS_DOPPLER_SOURCE: env
          VPS_OPS_DOPPLER_ROLES: gh-agent-broker
          VPS_OPS_GH_BROKER_ADMIN_SECRET: ${{ secrets.VPS_OPS_GH_BROKER_ADMIN_SECRET }}
          VPS_OPS_GH_BROKER_REPORTER_01_SECRET: ${{ secrets.VPS_OPS_GH_BROKER_REPORTER_01_SECRET }}
          VPS_OPS_GH_BROKER_SANDBOX_MCP_TOKEN: ${{ secrets.VPS_OPS_GH_BROKER_SANDBOX_MCP_TOKEN }}
          VPS_OPS_GH_BROKER_YKM_CURATOR_BROKER_SECRET: ${{ secrets.VPS_OPS_GH_BROKER_YKM_CURATOR_BROKER_SECRET }}
          VPS_OPS_HERMES_BROKER_AGENT_SECRET: ${{ secrets.VPS_OPS_HERMES_BROKER_AGENT_SECRET }}
          VPS_OPS_GH_BROKER_HERMES_AGENT_INFRA_APP_PEM: ${{ secrets.VPS_OPS_GH_BROKER_HERMES_AGENT_INFRA_APP_PEM }}
          VPS_OPS_GH_BROKER_FLEIGLABS_REPO_AGENT_BROKER_SECRET: ${{ secrets.VPS_OPS_GH_BROKER_FLEIGLABS_REPO_AGENT_BROKER_SECRET }}
          VPS_OPS_GH_BROKER_AGENTD_COORDINATOR_TOKEN: ${{ secrets.VPS_OPS_GH_BROKER_AGENTD_COORDINATOR_TOKEN }}
          VPS_OPS_GH_BROKER_FLEIGLABS_REPO_AGENT_APP_PEM: ${{ secrets.VPS_OPS_GH_BROKER_FLEIGLABS_REPO_AGENT_APP_PEM }}
          VPS_OPS_GH_BROKER_AGENT_PROXY_TOKEN: ${{ secrets.VPS_OPS_GH_BROKER_AGENT_PROXY_TOKEN }}
          VPS_OPS_GH_BROKER_LITELLM_MASTER_KEY: ${{ secrets.VPS_OPS_GH_BROKER_LITELLM_MASTER_KEY }}
          VPS_OPS_GH_BROKER_OPENROUTER_API_KEY: ${{ secrets.VPS_OPS_GH_BROKER_OPENROUTER_API_KEY }}
          VPS_OPS_GH_BROKER_REPORTER_APP_PEM: ${{ secrets.VPS_OPS_GH_BROKER_REPORTER_APP_PEM }}
          VPS_OPS_GH_BROKER_YKM_CURATOR_APP_PEM: ${{ secrets.VPS_OPS_GH_BROKER_YKM_CURATOR_APP_PEM }}
          VPS_OPS_GH_BROKER_YKM_CURATOR_SANDBOX_TIMER_TOKEN: ${{ secrets.VPS_OPS_GH_BROKER_YKM_CURATOR_SANDBOX_TIMER_TOKEN }}
          VPS_OPS_GH_BROKER_YKM_CURATOR_SANDBOX_ADMIN_TOKEN: ${{ secrets.VPS_OPS_GH_BROKER_YKM_CURATOR_SANDBOX_ADMIN_TOKEN }}
          VPS_OPS_GH_BROKER_YKM_CURATOR_SANDBOX_STAGING_ADMIN_TOKEN: ${{ secrets.VPS_OPS_GH_BROKER_YKM_CURATOR_SANDBOX_STAGING_ADMIN_TOKEN }}
          VPS_OPS_GH_BROKER_OPENROUTER_CURATOR_API_KEY: ${{ secrets.VPS_OPS_GH_BROKER_OPENROUTER_CURATOR_API_KEY }}
          VPS_OPS_GH_BROKER_GH_AGENT_CODEX_PROXY_TOKEN: ${{ secrets.VPS_OPS_GH_BROKER_GH_AGENT_CODEX_PROXY_TOKEN }}
        run: |
          scripts/run-ansible-playbook.sh -i inventory/production.yml playbooks/deploy-gh-agent-broker.yml \
            -e "broker_image=ghcr.io/grubbyhacker/gh-agent-broker:sha-${{ steps.deploy_inputs.outputs.deploy_sha }}" \
            -e "ansible_host=${DEPLOY_HOST}" \
            -e "ansible_port=${DEPLOY_PORT}" \
            -e "ansible_ssh_private_key_file=/tmp/hermes-deploy"

      - name: Log successful deploy telemetry
        if: success()
        uses: ./vps-ops/.github/actions/deploy-telemetry
        with:
          outcome: success
          service_label: gh-agent-broker
          github_token: ${{ github.token }}

      - name: Capture SSH failure diagnostics
        if: failure()
        uses: ./vps-ops/.github/actions/deploy-telemetry
        with:
          outcome: failure
          ssh_host: ${{ env.DEPLOY_HOST }}
          ssh_user: github-deployer
          ssh_port: ${{ env.DEPLOY_PORT }}
          ssh_key_path: /tmp/hermes-deploy
          service_label: gh-agent-broker
          github_token: ${{ github.token }}

      - name: Clean up secrets
        if: always()
        run: |
          rm -f /tmp/hermes-deploy
