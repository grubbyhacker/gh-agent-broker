version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - bodyclose
    - durationcheck
    - errcheck
    - errorlint
    - govet
    - gosec
    - ineffassign
    - misspell
    - nilerr
    - nilnil
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unused
    - whitespace
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    revive:
      rules:
        - name: package-comments
          disabled: true
    staticcheck:
      checks:
        - all
  exclusions:
    generated: lax

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
