services:
  broker:
    build: .
    command: ["-config", "/etc/gh-agent-broker/config.yaml"]
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      BROKER_ADMIN_SECRET: "replace-me-admin-secret"
      HERMES_CODER_01_BROKER_SECRET: "replace-me-agent-secret"
      BROKER_REPORTER_01_SECRET: "replace-me-reporter-secret"
    volumes:
      - ./configs/example.yaml:/etc/gh-agent-broker/config.yaml:ro
      - ./secrets/github-coder-app.pem:/run/secrets/github-coder-app.pem:ro
      - ./secrets/github-reporter-app.pem:/run/secrets/github-reporter-app.pem:ro
      - broker-audit:/var/log/gh-agent-broker
    healthcheck:
      test: ["CMD", "/usr/local/bin/gh-agent-broker-cli", "health", "-broker", "http://127.0.0.1:8080"]
      interval: 30s
      timeout: 5s
      retries: 3

  issue-reporter:
    build: .
    entrypoint: ["/usr/local/bin/broker-issue-reporter"]
    command: ["-config", "/etc/gh-agent-broker/reporter.yaml"]
    ports:
      - "127.0.0.1:8090:8090"
    environment:
      BROKER_REPORTER_01_SECRET: "replace-me-reporter-secret"
    volumes:
      - ./configs/reporter.example.yaml:/etc/gh-agent-broker/reporter.yaml:ro
    depends_on:
      broker:
        condition: service_healthy

volumes:
  broker-audit:
