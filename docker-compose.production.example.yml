services:
  broker:
    image: ${BROKER_IMAGE:?set BROKER_IMAGE to a pinned ghcr.io/grubbyhacker/gh-agent-broker tag}
    command: ["-config", "/etc/gh-agent-broker/config.yaml"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - ${BROKER_ENV_FILE:-.env}
    volumes:
      - ./configs/production.yaml:/etc/gh-agent-broker/config.yaml:ro
      - ./secrets/github-coder-app.pem:/run/secrets/github-coder-app.pem:ro
      - ./secrets/github-reporter-app.pem:/run/secrets/github-reporter-app.pem:ro
      - broker-audit:/var/log/gh-agent-broker
    networks:
      - default
      - sandbox-workers
    healthcheck:
      test: ["CMD", "/usr/local/bin/gh-agent-broker-cli", "health", "-broker", "http://127.0.0.1:8080"]
      interval: 30s
      timeout: 5s
      retries: 3

  issue-reporter:
    image: ${BROKER_IMAGE:?set BROKER_IMAGE to a pinned ghcr.io/grubbyhacker/gh-agent-broker tag}
    entrypoint: ["/usr/local/bin/broker-issue-reporter"]
    command: ["-config", "/etc/gh-agent-broker/reporter.yaml"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:8090"
    env_file:
      - ${BROKER_ENV_FILE:-.env}
    volumes:
      - ./configs/reporter.yaml:/etc/gh-agent-broker/reporter.yaml:ro
    depends_on:
      broker:
        condition: service_healthy

  sandbox-broker:
    image: ${BROKER_IMAGE:?set BROKER_IMAGE to a pinned ghcr.io/grubbyhacker/gh-agent-broker tag}
    entrypoint: ["/usr/local/bin/sandbox-broker"]
    command: ["-config", "/etc/gh-agent-broker/sandbox.yaml"]
    restart: unless-stopped
    group_add:
      - "${DOCKER_SOCK_GID:-1001}"
    ports:
      - "127.0.0.1:8091:8091"
    env_file:
      - ${BROKER_ENV_FILE:-.env}
    volumes:
      - ./configs/sandbox.yaml:/etc/gh-agent-broker/sandbox.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /srv/hermes-sandbox-broker:/srv/hermes-sandbox-broker
      - /srv/hermes-sandbox-credentials:/srv/hermes-sandbox-credentials:ro
    depends_on:
      broker:
        condition: service_healthy

volumes:
  broker-audit:

networks:
  sandbox-workers:
    name: hermes-sandbox-workers
    external: true
